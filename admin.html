<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리 페이지</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #222; color: white; text-align: center; padding: 20px; }
        h1 { font-size: 20px; }
        .card { background:#2c2c2c; border-radius:10px; padding:18px; max-width:440px; margin:14px auto; }
        label { display:inline-block; width:80px; text-align:right; margin-right:8px; font-size:15px; color:#cfcfcf; }
        input { padding: 10px; margin: 6px; font-size: 18px; width: 200px; text-align:right; border-radius:6px; border:none; }
        button { padding: 12px 26px; font-size: 17px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius:6px; }
        button:hover { background: #45a049; }
        .row { margin:8px 0; }
        .muted { color:#888; font-size:13px; margin-top:6px; line-height:1.5; }
        .live { font-size: 15px; color:#bbb; }
        .live b { color:#fff; font-size:18px; }
    </style>
</head>
<body>
    <h1>OBS 오버레이 수익 입력</h1>

    <div class="card">
        <div class="row"><label>일수익</label><input id="daily" type="text" inputmode="numeric" placeholder="오늘 수익"></div>
        <div class="row"><label>월수익</label><input id="weekly" type="text" inputmode="numeric" placeholder="이번 달 합계"></div>
        <div class="row"><label>연수익</label><input id="monthly" type="text" inputmode="numeric" placeholder="올해 합계"></div>
        <div class="row"><button onclick="saveData()">저장</button></div>
        <div class="muted">
            • 평소엔 <b>일수익</b>만 입력하면 됩니다. 하루가 지나면 자동으로 월·연 합계에 더해져요.<br>
            • 월수익·연수익을 직접 고쳐서 저장하면 그 값이 적용되고, 그 값부터 다시 자동 합산됩니다.
        </div>
    </div>

    <div class="card live">
        <div class="row">현재 표시 — 일: <b id="vDaily">0원</b> / 월: <b id="vWeekly">0원</b> / 연: <b id="vMonthly">0원</b></div>
        <div class="muted" id="lastInfo"></div>
    </div>

    <script>
    function toNum(v){ if(v===null||v===undefined) return 0; var n=parseInt(String(v).replace(/[^0-9-]/g,''),10); return isNaN(n)?0:n; }
    function won(n){ return (toNum(n)).toLocaleString()+'원'; }
    function dateParts(){
        var n=new Date();
        var y=n.getFullYear();
        var m=String(n.getMonth()+1).padStart(2,'0');
        var d=String(n.getDate()).padStart(2,'0');
        return { day:y+'-'+m+'-'+d, month:y+'-'+m, year:String(y) };
    }

    // 누적값(base) 기준으로 표시값 재계산: 월수익 = 월누적 + 오늘, 연수익 = 연누적 + 오늘
    function recompute(data){
        var today=toNum(data.today);
        var monthBase=toNum(data.monthBase);
        var yearBase=toNum(data.yearBase);
        data.today=today; data.monthBase=monthBase; data.yearBase=yearBase;
        data.daily=today;
        data.weekly=monthBase+today;
        data.monthly=yearBase+today;
        return data;
    }

    // 날짜가 바뀌었으면 어제 일수익을 누적에 합산 (트랜잭션으로 중복 방지)
    function rollover(cb){
        var cur=dateParts();
        db.ref('overlayData').transaction(function(data){
            if(!data) data={ today:0, monthBase:0, yearBase:0 };
            var today=toNum(data.today), monthBase=toNum(data.monthBase), yearBase=toNum(data.yearBase);
            if(!data.lastDay){
                data.lastDay=cur.day; data.lastMonth=cur.month; data.lastYear=cur.year;
                return recompute(data);
            }
            if(data.lastDay!==cur.day){
                yearBase  = (data.lastYear===cur.year)  ? yearBase+today  : 0;
                monthBase = (data.lastMonth===cur.month) ? monthBase+today : 0;
                today=0;
                data.today=today; data.monthBase=monthBase; data.yearBase=yearBase;
                data.lastDay=cur.day; data.lastMonth=cur.month; data.lastYear=cur.year;
                return recompute(data);
            }
            return data;
        }, function(err){ if(cb) cb(); });
    }

    var firstRender=true;
    function render(data){
        data=data||{};
        document.getElementById('vDaily').innerText=won(data.daily);
        document.getElementById('vWeekly').innerText=won(data.weekly);
        document.getElementById('vMonthly').innerText=won(data.monthly);
        document.getElementById('lastInfo').innerText='마지막 기준 날짜: '+(data.lastDay||'-');
        // 입력하는 중이 아닌 칸은 현재값으로 채워줌
        fill('daily', toNum(data.daily));
        fill('weekly', toNum(data.weekly));
        fill('monthly', toNum(data.monthly));
        firstRender=false;
    }
    function fill(id, val){
        var el=document.getElementById(id);
        if(document.activeElement!==el) el.value = val;
    }

    function saveData(){
        var dailyV=toNum(document.getElementById('daily').value);
        var weeklyV=toNum(document.getElementById('weekly').value);   // 월수익(표시 합계)
        var monthlyV=toNum(document.getElementById('monthly').value); // 연수익(표시 합계)
        db.ref('overlayData').transaction(function(data){
            if(!data){ var c=dateParts(); data={ today:0, monthBase:0, yearBase:0, lastDay:c.day, lastMonth:c.month, lastYear:c.year }; }
            data.today=dailyV;
            // 월·연은 '표시 합계'를 입력받아 누적값(base)으로 역산 (base = 합계 - 오늘)
            data.monthBase=weeklyV-dailyV;
            data.yearBase=monthlyV-dailyV;
            return recompute(data);
        }, function(err){
            if(err){ alert('저장 실패: '+err); } else { alert('저장 완료!'); }
        });
    }

    // 페이지 열릴 때 날짜 롤오버 점검 후 실시간 표시
    rollover(function(){
        db.ref('overlayData').on('value', function(snap){ render(snap.val()); });
    });
    </script>
</body>
</html>

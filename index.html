<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>컴아저씨 통합 오버레이</title>
<script src="https://cdn.jsdelivr.net/npm/@rtirl/api"></script>

<style>
  /* ===== 공통 폰트 (Noto Sans KR) ===== */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  body {
    margin: 0;
    background: transparent;
    color: #ffffff;
    font-family: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
  }

  /* ===== 통합 바 ===== */
  #overlay {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(8px);
    padding: 8px 18px;
    border-radius: 32px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.55);
    font-size: 15px;
    font-weight: 400;
    line-height: 1;
    white-space: nowrap;
    z-index: 9999;
  }

  /* 모든 텍스트 세그먼트 공통 (일정한 크기/색) */
  .seg {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 15px;
    font-weight: 400;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
  }

  .seg .label { opacity: 0.85; }
  .seg .val { font-weight: 500; }

  /* 구분선 */
  .divider {
    width: 1px;
    height: 16px;
    background: rgba(255, 255, 255, 0.22);
    flex: 0 0 auto;
  }

  /* ===== 플랫폼 로고 (균일 크기) ===== */
  .logo-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-container .icon {
    height: 20px;
    width: 20px;
    object-fit: contain;
    opacity: 1;
    display: block;
  }

  /* ===== 배터리 ===== */
  .battery-container {
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
  }

  #batteryIcon {
    width: 26px;
    height: 13px;
    border: 1.5px solid rgba(255, 255, 255, 0.9);
    border-radius: 3px;
    position: relative;
    background: rgba(0, 0, 0, 0.3);
  }

  #batteryFill {
    height: 100%;
    width: 0%;
    transition: width 0.3s ease, background 0.3s ease;
    border-radius: 1px;
  }

  #batteryFill.level-100 { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
  #batteryFill.level-90  { background: #33ff00; box-shadow: 0 0 8px #33ff00; }
  #batteryFill.level-80  { background: #66ff00; box-shadow: 0 0 8px #66ff00; }
  #batteryFill.level-70  { background: #99ff00; box-shadow: 0 0 8px #99ff00; }
  #batteryFill.level-60  { background: #ccff00; box-shadow: 0 0 8px #ccff00; }
  #batteryFill.level-50  { background: #ffff00; box-shadow: 0 0 8px #ffff00; }
  #batteryFill.level-40  { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
  #batteryFill.level-30  { background: #ff9900; box-shadow: 0 0 8px #ff9900; }
  #batteryFill.level-20  { background: #ff6600; box-shadow: 0 0 8px #ff6600; }
  #batteryFill.level-10  { background: #ff3300; box-shadow: 0 0 8px #ff3300; }
  #batteryFill.level-0   { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

  #batteryBolt {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 15px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.9);
    display: none;
    pointer-events: none;
    line-height: 1;
    z-index: 10;
    animation: boltPulse 1s infinite;
  }

  #batteryCap {
    position: absolute;
    right: -4px;
    top: 3px;
    width: 2px;
    height: 6px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 1px;
  }

  #batteryText {
    min-width: 34px;
    font-weight: 400;
    font-size: 15px;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
  }

  /* 툴팁 */
  [data-tooltip] { position: relative; cursor: help; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.9);
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10000;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  @keyframes boltPulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
  }
</style>
</head>
<body>

<div id="overlay">

  <!-- 이동 거리 -->
  <span class="seg" id="distance" data-tooltip="오늘 이동 거리">
    <span class="label">이동거리</span> <span class="val">0.00 km</span>
  </span>

  <span class="divider"></span>

  <!-- 수익 (Firebase overlayData) -->
  <span class="seg" data-tooltip="오늘 수익"><span class="label">일수익</span> <span class="val" id="dailyText">0원</span></span>
  <span class="seg" data-tooltip="이번 달 수익"><span class="label">월수익</span> <span class="val" id="weeklyText">0원</span></span>
  <span class="seg" data-tooltip="올해 수익"><span class="label">연수익</span> <span class="val" id="monthlyText">0원</span></span>

  <span class="divider"></span>

  <!-- 플랫폼 로고 (균일 크기) -->
  <div class="logo-container">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%EC%88%B2%EB%A1%9C%EA%B3%A0.png" alt="숲" title="SOOP">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%EC%B9%98%EC%A7%80%EC%A7%81%EB%A1%9C%EA%B3%A0.png" alt="치지직" title="치지직">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%ED%8A%B8%EC%9C%84%EC%B9%98%EB%A1%9C%EA%B3%A0.png" alt="Twitch" title="Twitch">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%EC%9C%A0%ED%8A%9C%EB%B8%8C%EB%A1%9C%EA%B3%A0.png" alt="YouTube" title="YouTube">
  </div>

  <span class="divider"></span>

  <!-- 날씨 -->
  <span class="seg" id="weather" data-tooltip="현재 날씨">🌡️ --°C</span>

  <!-- 시간 -->
  <span class="seg" id="time" data-tooltip="현재 시간">🕐 --</span>

  <!-- 배터리 -->
  <div class="battery-container" data-tooltip="배터리 잔량">
    <div id="batteryIcon">
      <div id="batteryFill"></div>
      <div id="batteryBolt">⚡</div>
      <div id="batteryCap"></div>
    </div>
    <span id="batteryText">--%</span>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyA5hMmN9QFgdFtaA5gicS_pj-blu_jJdvE",
  authDomain: "rider-bf48b.firebaseapp.com",
  databaseURL: "https://rider-bf48b-default-rtdb.firebaseio.com",
  projectId: "rider-bf48b",
  storageBucket: "rider-bf48b.firebasestorage.app",
  messagingSenderId: "1026929653322",
  appId: "1:1026929653322:web:b90541cccba5b4186198b3"
};

let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  console.log('🔥 Firebase 연결 성공');
} catch (error) {
  console.error('❌ Firebase 초기화 실패:', error);
}

/* ===== 수익 (overlayData) ===== */
function formatWon(value) {
  if (!value && value !== 0) return '0원';
  const num = parseInt(value.toString().replace(/[^0-9]/g, ''));
  if (isNaN(num)) return value;
  return num.toLocaleString() + '원';
}

if (db) {
  onValue(ref(db, 'overlayData'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    document.getElementById('dailyText').innerText   = formatWon(data.daily);
    document.getElementById('weeklyText').innerText  = formatWon(data.weekly);
    document.getElementById('monthlyText').innerText = formatWon(data.monthly);
  }, (error) => console.error('❌ 수익 데이터 로드 실패:', error));
}

/* ===== 배터리 (battery) ===== */
function getBatteryLevelClass(level) {
  const r = Math.floor(level / 10) * 10;
  const map = {100:'level-100',90:'level-90',80:'level-80',70:'level-70',60:'level-60',50:'level-50',40:'level-40',30:'level-30',20:'level-20',10:'level-10',0:'level-0'};
  return map[r] ?? 'level-0';
}

function updateBattery(level, charging) {
  const t = document.getElementById('batteryText');
  const f = document.getElementById('batteryFill');
  const b = document.getElementById('batteryBolt');
  level = Math.min(100, Math.max(0, level));
  t.innerText = level + '%';
  f.style.width = level + '%';
  f.className = getBatteryLevelClass(level);
  b.style.display = charging ? 'block' : 'none';
}

function startBatteryDummy() {
  console.warn('⚠️ 배터리 테스트 모드');
  setInterval(() => updateBattery(Math.floor(Math.random()*101), Math.random()>0.7), 3000);
}

if (db) {
  onValue(ref(db, 'battery'), (snapshot) => {
    if (!snapshot.exists()) return;
    const data = snapshot.val();
    if (data && typeof data.level === 'number') updateBattery(data.level, data.charging || false);
  }, (error) => { console.error('❌ 배터리 로드 실패:', error); startBatteryDummy(); });
} else {
  startBatteryDummy();
}

/* ===== GPS 이동거리 (RealtimeIRL) ===== */
let totalDistance = 0;
let previousLocation = null;
let lastUpdateTime = 0;
const GPS_TIMEOUT_MS = 6 * 60 * 60 * 1000;
const GPS_NO_SIGNAL_MS = 10 * 1000;
const distanceValEl = document.querySelector('#distance .val');

function setDistanceDisplay(text, color = '#ffffff') {
  distanceValEl.innerText = text;
  distanceValEl.style.color = color;
}
function updateDistanceDisplay() { setDistanceDisplay(totalDistance.toFixed(2) + ' km'); }
function saveGpsState() {
  localStorage.setItem('totalDistance', totalDistance.toString());
  localStorage.setItem('lastGpsUpdate', lastUpdateTime.toString());
}
function resetGpsState() {
  totalDistance = 0; previousLocation = null; lastUpdateTime = 0;
  localStorage.removeItem('totalDistance');
  localStorage.removeItem('lastGpsUpdate');
  updateDistanceDisplay();
}

const savedDistance = localStorage.getItem('totalDistance');
const savedLastUpdate = localStorage.getItem('lastGpsUpdate');
if (savedDistance && savedLastUpdate) {
  if (Date.now() - parseInt(savedLastUpdate) <= GPS_TIMEOUT_MS) {
    totalDistance = parseFloat(savedDistance); updateDistanceDisplay();
  } else { resetGpsState(); }
} else if (savedDistance) {
  totalDistance = parseFloat(savedDistance); updateDistanceDisplay();
}

setInterval(() => {
  if (lastUpdateTime === 0) return;
  const elapsed = Date.now() - lastUpdateTime;
  if (elapsed > GPS_TIMEOUT_MS) resetGpsState();
  else if (elapsed > GPS_NO_SIGNAL_MS) setDistanceDisplay('⏸️ 신호없음', '#aaaaaa');
}, 1000);
setInterval(() => { if (lastUpdateTime > 0) saveGpsState(); }, 60000);
window.addEventListener('beforeunload', () => { if (lastUpdateTime > 0) saveGpsState(); });

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const f1 = lat1 * Math.PI/180, f2 = lat2 * Math.PI/180;
  const df = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

try {
  RealtimeIRL.forPullKey("zeoeyze9htbyx455").addLocationListener((location) => {
    if (!location.latitude || !location.longitude) return;
    lastUpdateTime = Date.now();
    if (previousLocation) {
      const d = calculateDistance(previousLocation.latitude, previousLocation.longitude, location.latitude, location.longitude);
      totalDistance += d / 1000;
    }
    previousLocation = { latitude: location.latitude, longitude: location.longitude };
    updateDistanceDisplay();
  });
  console.log('📍 GPS 연결 시작');
} catch (error) {
  console.error('❌ GPS 오류:', error);
  setDistanceDisplay('GPS 오류', '#ff4444');
}

/* ===== 시간 ===== */
function updateTime() {
  document.getElementById('time').innerHTML = '🕐 ' + new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', hour12:true });
}
updateTime();
setInterval(updateTime, 1000);

/* ===== 날씨 ===== */
const WEATHER_API_KEY = "3a4a39b054762e36581605681026ed35";
const CITY = "Sejong";
function getWeatherEmoji(code) {
  const map = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'};
  return map[code] || '🌡️';
}
async function updateWeather() {
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('weather').innerHTML = `${getWeatherEmoji(data.weather[0].icon)} ${Math.round(data.main.temp)}°C`;
  } catch (error) {
    console.error('❌ 날씨 실패:', error);
    document.getElementById('weather').innerHTML = '🌡️ --°C';
  }
}
updateWeather();
setInterval(updateWeather, 600000);

console.log('✅ 프랭크 통합 오버레이 로드 완료');
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>통합 오버레이</title>
<script src="https://cdn.jsdelivr.net/npm/@rtirl/api"></script>

<style>
  /* ===== 공통 폰트 (Noto Sans KR) ===== */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  body {
    margin: 0;
    background: transparent;
    color: #ffffff;
    font-family: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
  }

  /* ===== 통합 바 ===== */
  #overlayInner {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    white-space: nowrap;
    line-height: 1;
    transform-origin: left center;
    flex: 0 0 auto;
  }
  #overlay {
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(8px);
    padding: 0 22px;
    border-radius: 0;
    border: none;
    box-shadow: none;
    font-size: 22px;
    font-weight: 400;
    line-height: 1;
    white-space: nowrap;
    z-index: 9999;
  }

  /* 모든 텍스트 세그먼트 공통 (일정한 크기/색) */
  .seg {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 22px;
    font-weight: 400;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
  }

  .seg .label { opacity: 0.85; }
  .seg .val { font-weight: 500; }

  /* ===== 수익 강조 ===== */
  .income-val { color: #ffffff; font-weight: 600; display: inline-block; transform-origin: center; }
  .income-goal { font-size: 15px; font-weight: 500; opacity: 0.85; margin-left: 3px; color: #9fd0ff; }
  .income-goal.done { color: #00e676; }
  @keyframes incomeFlash {
    0%   { transform: scale(1);    filter: brightness(1);   }
    30%  { transform: scale(1.22); filter: brightness(1.9); color: #fff59d; }
    100% { transform: scale(1);    filter: brightness(1);   }
  }
  .income-val.flash { animation: incomeFlash 0.85s ease; }

  /* 구분선 */
  .divider {
    width: 1px;
    height: 28px;
    background: rgba(255, 255, 255, 0.22);
    flex: 0 0 auto;
  }

  /* ===== 플랫폼 로고 (균일 크기) ===== */
  .logo-container {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo-container .icon {
    height: 32px;
    width: 32px;
    margin: -8px 0;
    object-fit: contain;
    opacity: 1;
    display: block;
  }

  #channelLogo {
    height: 36px;
    width: auto;
    margin: 0 4px 0 0;
    object-fit: contain;
    display: block;
    flex: 0 0 auto;
  }

  /* ===== 신호 강도 (RealtimeIRL) ===== */
  .signal-container {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 26px;
    padding: 0 2px;
    flex: 0 0 auto;
  }
  .signal-container .sig-bar {
    width: 5px;
    border-radius: 1px;
    background: rgba(255, 255, 255, 0.25);
    transition: background 0.4s ease;
  }
  .signal-container .sig-bar:nth-child(1) { height: 30%; }
  .signal-container .sig-bar:nth-child(2) { height: 52%; }
  .signal-container .sig-bar:nth-child(3) { height: 74%; }
  .signal-container .sig-bar:nth-child(4) { height: 100%; }

  /* ===== 배터리 ===== */
  .battery-container {
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
  }

  #batteryIcon {
    width: 36px;
    height: 18px;
    border: 1.5px solid rgba(255, 255, 255, 0.9);
    border-radius: 3px;
    position: relative;
    background: rgba(0, 0, 0, 0.3);
  }

  #batteryFill {
    height: 100%;
    width: 0%;
    transition: width 0.3s ease, background 0.3s ease;
    border-radius: 1px;
  }

  #batteryFill.level-100 { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
  #batteryFill.level-90  { background: #33ff00; box-shadow: 0 0 8px #33ff00; }
  #batteryFill.level-80  { background: #66ff00; box-shadow: 0 0 8px #66ff00; }
  #batteryFill.level-70  { background: #99ff00; box-shadow: 0 0 8px #99ff00; }
  #batteryFill.level-60  { background: #ccff00; box-shadow: 0 0 8px #ccff00; }
  #batteryFill.level-50  { background: #ffff00; box-shadow: 0 0 8px #ffff00; }
  #batteryFill.level-40  { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
  #batteryFill.level-30  { background: #ff9900; box-shadow: 0 0 8px #ff9900; }
  #batteryFill.level-20  { background: #ff6600; box-shadow: 0 0 8px #ff6600; }
  #batteryFill.level-10  { background: #ff3300; box-shadow: 0 0 8px #ff3300; }
  #batteryFill.level-0   { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

  #batteryBolt {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.9);
    display: none;
    pointer-events: none;
    line-height: 1;
    z-index: 10;
    animation: boltPulse 1s infinite;
  }

  #batteryCap {
    position: absolute;
    right: -4px;
    top: 4px;
    width: 2px;
    height: 9px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 1px;
  }

  #batteryText {
    min-width: 40px;
    font-weight: 400;
    font-size: 20px;
    color: #ffffff;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
  }

  /* 툴팁 */
  [data-tooltip] { position: relative; cursor: help; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.9);
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10000;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  @keyframes boltPulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
  }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyA5hMmN9QFgdFtaA5gicS_pj-blu_jJdvE",
  authDomain: "rider-bf48b.firebaseapp.com",
  databaseURL: "https://rider-bf48b-default-rtdb.firebaseio.com",
  projectId: "rider-bf48b",
  storageBucket: "rider-bf48b.firebasestorage.app",
  messagingSenderId: "1026929653322",
  appId: "1:1026929653322:web:b90541cccba5b4186198b3"
};

let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  console.log('🔥 Firebase 연결 성공');
} catch (error) {
  console.error('❌ Firebase 초기화 실패:', error);
}

/* ===== 수익 (overlayData) ===== */
function formatWon(value) {
  if (!value && value !== 0) return '0원';
  const num = parseInt(value.toString().replace(/[^0-9]/g, ''));
  if (isNaN(num)) return value;
  return num.toLocaleString() + '원';
}

let _prevDaily = null, _prevWeekly = null, _prevMonthly = null;
function _incNum(v){ const n = parseInt(String(v == null ? 0 : v).replace(/[^0-9-]/g, ''), 10); return isNaN(n) ? 0 : n; }
function _flashIncome(id){ const el = document.getElementById(id); if(!el) return; el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
function _renderGoal(goalId, current, goal){
  const g = document.getElementById(goalId); if(!g) return;
  const goalN = _incNum(goal);
  if(goalN <= 0){ g.innerText = ''; g.classList.remove('done'); return; }
  const pct = Math.round(current / goalN * 100);
  g.innerText = '(' + pct + '%)';
  g.classList.toggle('done', pct >= 100);
}

if (db) {
  onValue(ref(db, 'overlayData'), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    const _d = _incNum(data.daily), _w = _incNum(data.weekly), _m = _incNum(data.monthly);
    document.getElementById('dailyText').innerText   = formatWon(data.daily);
    document.getElementById('weeklyText').innerText  = formatWon(data.weekly);
    document.getElementById('monthlyText').innerText = formatWon(data.monthly);
    _renderGoal('dailyGoalText', _d, data.dailyGoal);
    _renderGoal('weeklyGoalText', _w, data.monthGoal);
    _renderGoal('monthlyGoalText', _m, data.yearGoal);
    if(_prevDaily   !== null && _d > _prevDaily)   _flashIncome('dailyText');
    if(_prevWeekly  !== null && _w > _prevWeekly)  _flashIncome('weeklyText');
    if(_prevMonthly !== null && _m > _prevMonthly) _flashIncome('monthlyText');
    _prevDaily = _d; _prevWeekly = _w; _prevMonthly = _m;
  }, (error) => console.error('����� 수익 데이터 로드 실패:', error));

  /* ===== 날짜 롤오버: 하루 지나면 어제 일수익을 월/연 누적에 자동 합산 ===== */
  function toNumInc(v){ if(v===null||v===undefined) return 0; const n=parseInt(String(v).replace(/[^0-9-]/g,''),10); return isNaN(n)?0:n; }
  function incDateParts(){
    const n=new Date();
    const mm=String(n.getMonth()+1).padStart(2,'0');
    const dd=String(n.getDate()).padStart(2,'0');
    return { day:n.getFullYear()+'-'+mm+'-'+dd, month:n.getFullYear()+'-'+mm, year:String(n.getFullYear()) };
  }
  function incomeRollover(){
    const cur=incDateParts();
    runTransaction(ref(db,'overlayData'), (data) => {
      if(!data) return data;
      let today=toNumInc(data.today), monthBase=toNumInc(data.monthBase), yearBase=toNumInc(data.yearBase);
      if(!data.lastDay){
        data.lastDay=cur.day; data.lastMonth=cur.month; data.lastYear=cur.year;
        data.today=today; data.monthBase=monthBase; data.yearBase=yearBase;
        data.daily=today; data.weekly=monthBase+today; data.monthly=yearBase+today;
        return data;
      }
      if(data.lastDay!==cur.day){
        yearBase  = (data.lastYear===cur.year)  ? yearBase+today  : 0;
        monthBase = (data.lastMonth===cur.month) ? monthBase+today : 0;
        today=0;
        data.today=today; data.monthBase=monthBase; data.yearBase=yearBase;
        data.lastDay=cur.day; data.lastMonth=cur.month; data.lastYear=cur.year;
        data.daily=today; data.weekly=monthBase+today; data.monthly=yearBase+today;
      }
      return data;
    }).catch((e)=>console.error('❌ 롤오버 실패:', e));
  }
  incomeRollover();
  setInterval(incomeRollover, 60000);
}

/* ===== 폭 자동 맞춤 (auto-fit): 숫자가 커져도 한 줄에 다 들어가도록 축소 ===== */
function autoFitOverlay(){
  const ov = document.getElementById('overlay');
  const inner = document.getElementById('overlayInner');
  if(!ov || !inner) return;
  inner.style.transform = 'scale(1)';
  const st = getComputedStyle(ov);
  const avail = ov.clientWidth - (parseFloat(st.paddingLeft)||0) - (parseFloat(st.paddingRight)||0);
  // flex:0 0 auto 덕분에 압축되지 않아 실제 너비를 정확히 측정함
  const need = Math.max(inner.scrollWidth, inner.offsetWidth);
  if(need > avail && need > 0){
    inner.style.transform = 'scale(' + (avail/need) + ')';
  }
}
window.addEventListener('load', autoFitOverlay);
window.addEventListener('resize', autoFitOverlay);
setInterval(autoFitOverlay, 500);

  const map = {100:'level-100',90:'level-90',80:'level-80',70:'level-70',60:'level-60',50:'level-50',40:'level-40',30:'level-30',20:'level-20',10:'level-10',0:'level-0'};
  return map[r] ?? 'level-0';
}

function updateBattery(level, charging) {
  const t = document.getElementById('batteryText');

/* ===== GPS 이동거리 (RealtimeIRL) ===== */
let totalDistance = 0;
let previousLocation = null;
let lastUpdateTime = 0;
const GPS_TIMEOUT_MS = 6 * 60 * 60 * 1000;
const GPS_NO_SIGNAL_MS = 10 * 1000;
const distanceValEl = document.querySelector('#distance .val');

function setDistanceDisplay(text, color = '#ffffff') {
  distanceValEl.innerText = text;
  distanceValEl.style.color = color;
}
function updateDistanceDisplay() { setDistanceDisplay(totalDistance.toFixed(2) + ' km'); }
function saveGpsState() {
  localStorage.setItem('totalDistance', totalDistance.toString());
  localStorage.setItem('lastGpsUpdate', lastUpdateTime.toString());
}
function resetGpsState() {
  totalDistance = 0; previousLocation = null; lastUpdateTime = 0;
  localStorage.removeItem('totalDistance');
  localStorage.removeItem('lastGpsUpdate');
  updateDistanceDisplay();
}

const savedDistance = localStorage.getItem('totalDistance');
const savedLastUpdate = localStorage.getItem('lastGpsUpdate');
if (savedDistance && savedLastUpdate) {
  if (Date.now() - parseInt(savedLastUpdate) <= GPS_TIMEOUT_MS) {
    totalDistance = parseFloat(savedDistance); updateDistanceDisplay();
  } else { resetGpsState(); }
} else if (savedDistance) {
  totalDistance = parseFloat(savedDistance); updateDistanceDisplay();
}

setInterval(() => {
  if (lastUpdateTime === 0) return;
  const elapsed = Date.now() - lastUpdateTime;
  // 신호가 끊겨도 이동거리는 마지막 값을 그대로 유지 (끊김 표시는 신호 막대로만)
  // 단, 6시간 이상 무신호면 새 주행으로 보고 거리 초기화
  if (elapsed > GPS_TIMEOUT_MS) resetGpsState();
}, 1000);
setInterval(() => { if (lastUpdateTime > 0) saveGpsState(); }, 60000);
window.addEventListener('beforeunload', () => { if (lastUpdateTime > 0) saveGpsState(); });

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const f1 = lat1 * Math.PI/180, f2 = lat2 * Math.PI/180;
  const df = (lat2-lat1)*Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

try {
  RealtimeIRL.forPullKey("zeoeyze9htbyx455").addLocationListener((location) => {
    if (!location.latitude || !location.longitude) return;
    lastUpdateTime = Date.now();
    if (previousLocation) {
      const d = calculateDistance(previousLocation.latitude, previousLocation.longitude, location.latitude, location.longitude);
      totalDistance += d / 1000;
    }
    previousLocation = { latitude: location.latitude, longitude: location.longitude };
    updateDistanceDisplay();
  });
  console.log('📍 GPS 연결 시작');
} catch (error) {
  console.error('❌ GPS 오류:', error);
  setDistanceDisplay('GPS 오류', '#ff4444');
}

/* ===== 신호 강도 (RealtimeIRL 연결 상태) ===== */
/* RealtimeIRL에서 GPS/네트워크 데이터가 들어오는 신선도(lastUpdateTime)를 기준으로
   송출 연결 상태를 신호 막대로 표시합니다. 데이터가 자�� 들어올수록 강한 신호. */
const signalBars = document.querySelectorAll('#signal .sig-bar');
function setSignalLevel(level, color) {
  signalBars.forEach((bar, i) => {
    bar.style.background = (i < level) ? color : 'rgba(255,255,255,0.25)';
  });
}
function updateSignal() {
  if (lastUpdateTime === 0) { setSignalLevel(1, '#ff3b30'); return; }
  const elapsed = Date.now() - lastUpdateTime;
  if (elapsed < 5000)       setSignalLevel(4, '#00e676'); // 강함 (초록)
  else if (elapsed < 10000) setSignalLevel(3, '#a8e000'); // 양호 (연두)
  else if (elapsed < 20000) setSignalLevel(2, '#ff9500'); // 불안정 (주황)
  else                      setSignalLevel(1, '#ff3b30'); // 끊김 위험 (빨강)
}
updateSignal();
setInterval(updateSignal, 1000);

function getWeatherEmoji(code) {

  return map[code] || '🌡️';
}
async function updateWeather() {
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`);

    console.error('❌ 날씨 실패:', error);

  }
}

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>컴아저씨 오버레이</title>
<script src="https://cdn.jsdelivr.net/npm/@rtirl/api"></script>

<style>
  /* 수익 오버레이와 동일한 폰트 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  body {
    margin: 0;
    background: transparent;
    color: white;
    font-family: 'Noto Sans KR', -apple-system, 'Segoe UI', sans-serif;
  }

  /* 전체 오버레이 */
  #overlay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    font-size: 15px;
    z-index: 9999;
  }

  /* GPS 거리 */
  #distance {
    color: #7df9ff;
    font-weight: 400;
    text-shadow: 0 0 8px rgba(125, 249, 255, 0.5);
    margin-right: 2px;
  }

  /* 날씨, 시간 */
  #weather, #time {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  /* 배터리 컨테이너 */
  .battery-container {
    display: flex;
    align-items: center;
    gap: 3px;
    position: relative;
  }

  /* 배터리 아이콘 */
  #batteryIcon {
    width: 24px;
    height: 12px;
    border: 1.5px solid rgba(255, 255, 255, 0.9);
    border-radius: 3px;
    position: relative;
    background: rgba(0, 0, 0, 0.3);
  }

  /* 배터리 잔량 */
  #batteryFill {
    height: 100%;
    width: 0%;
    transition: width 0.3s ease, background 0.3s ease;
    border-radius: 1px;
  }

  /* 배터리 잔량 색상 클래스 */
  #batteryFill.level-100 { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
  #batteryFill.level-90  { background: #33ff00; box-shadow: 0 0 8px #33ff00; }
  #batteryFill.level-80  { background: #66ff00; box-shadow: 0 0 8px #66ff00; }
  #batteryFill.level-70  { background: #99ff00; box-shadow: 0 0 8px #99ff00; }
  #batteryFill.level-60  { background: #ccff00; box-shadow: 0 0 8px #ccff00; }
  #batteryFill.level-50  { background: #ffff00; box-shadow: 0 0 8px #ffff00; }
  #batteryFill.level-40  { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
  #batteryFill.level-30  { background: #ff9900; box-shadow: 0 0 8px #ff9900; }
  #batteryFill.level-20  { background: #ff6600; box-shadow: 0 0 8px #ff6600; }
  #batteryFill.level-10  { background: #ff3300; box-shadow: 0 0 8px #ff3300; }
  #batteryFill.level-0   { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

  /* 충전 중 번개 표시 */
  #batteryBolt {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.9), 0 0 20px rgba(255, 215, 0, 0.5);
    display: none;
    pointer-events: none;
    line-height: 1;
    z-index: 10;
    animation: boltPulse 1s infinite;
  }

  /* 배터리 뚜껑 */
  #batteryCap {
    position: absolute;
    right: -4px;
    top: 2.5px;
    width: 2px;
    height: 5px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 1px;
  }

  /* 배터리 텍스트 */
  #batteryText {
    min-width: 35px;
    font-weight: 400;
    font-size: 13px;
  }

  /* 로고 컨테이너 */
  .logo-container {
    display: flex;
    align-items: center;
    gap: 3px;
    padding-left: 4px;
    border-left: 1px solid rgba(255, 255, 255, 0.2);
    margin-left: 2px;
  }

  /* 로고 아이콘 */
  .icon {
    height: 16px;
    width: auto;
    opacity: 0.8;
    transition: all 0.2s ease;
    filter: brightness(0.9);
  }

  .icon:hover {
    opacity: 1;
    transform: scale(1.1);
    filter: brightness(1.2);
  }

  /* 툴팁 */
  [data-tooltip] {
    position: relative;
    cursor: help;
  }

  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 30px;
    right: 0;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10000;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  /* 애니메이션 */
  @keyframes boltPulse {
    0%, 100% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.9), 0 0 20px rgba(255, 215, 0, 0.5);
    }
    50% {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(1.2);
      text-shadow: 0 0 15px rgba(255, 215, 0, 1), 0 0 30px rgba(255, 215, 0, 0.8);
    }
  }
</style>
</head>
<body>

<div id="overlay">

  <!-- GPS 거리 -->
  <div id="distance" data-tooltip="오늘 이동 거리">
    0.00 km
  </div>

  <!-- 날씨 -->
  <div id="weather" data-tooltip="현재 날씨">
    🌡️ --
  </div>

  <!-- 시간 -->
  <div id="time" data-tooltip="현재 시간">
    🕐 --
  </div>

  <!-- 배터리 -->
  <div class="battery-container" data-tooltip="배터리 잔량">
    <div id="batteryIcon">
      <div id="batteryFill"></div>
      <div id="batteryBolt">⚡</div>
      <div id="batteryCap"></div>
    </div>
    <div id="batteryText">--%</div>
  </div>

  <!-- 로고 -->
  <div class="logo-container">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%EC%88%B2%EB%A1%9C%EA%B3%A0.png" alt="숲" title="숲">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%EC%B9%98%EC%A7%80%EC%A7%81%EB%A1%9C%EA%B3%A0.png" alt="치지직" title="치지직">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%ED%8A%B8%EC%9C%84%EC%B9%98%EB%A1%9C%EA%B3%A0.png" alt="Twitch" title="Twitch">
    <img class="icon" src="https://raw.githubusercontent.com/ljw2455qq/obs-overlay/main/%EC%9C%A0%ED%8A%9C%EB%B8%8C%EB%A1%9C%EA%B3%A0.png" alt="YouTube" title="YouTube">
  </div>

</div>

<script type="module">
/* ======================
   Firebase 설정
   ⚠️ 아래 값들을 Firebase 콘솔에서 실제 값으로 교체하세요
   Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱 → SDK 설정 및 구성
====================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5hMmN9QFgdFtaA5gicS_pj-blu_jJdvE",
  authDomain: "rider-bf48b.firebaseapp.com",
  databaseURL: "https://rider-bf48b-default-rtdb.firebaseio.com",
  projectId: "rider-bf48b",
  storageBucket: "rider-bf48b.firebasestorage.app",
  messagingSenderId: "1026929653322",
  appId: "1:1026929653322:web:b90541cccba5b4186198b3"
};

// Firebase 초기화
let db = null;
try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  console.log('🔥 Firebase 연결 성공');
} catch (error) {
  console.error('❌ Firebase 초기화 실패:', error);
}

/* ======================
   10% 단위 배터리 색상
====================== */
function getBatteryLevelClass(level) {
  const roundedLevel = Math.floor(level / 10) * 10;
  const map = {
    100: 'level-100', 90: 'level-90', 80: 'level-80',
    70:  'level-70',  60: 'level-60', 50: 'level-50',
    40:  'level-40',  30: 'level-30', 20: 'level-20',
    10:  'level-10',  0:  'level-0'
  };
  return map[roundedLevel] ?? 'level-0';
}

/* ======================
   배터리 업데이트
====================== */
function updateBattery(level, charging) {
  const batteryText = document.getElementById('batteryText');
  const batteryFill = document.getElementById('batteryFill');
  const batteryBolt = document.getElementById('batteryBolt');

  level = Math.min(100, Math.max(0, level));

  batteryText.innerText = level + '%';
  batteryFill.style.width = level + '%';
  batteryFill.className = getBatteryLevelClass(level);
  batteryBolt.style.display = charging ? 'block' : 'none';
}

// 배터리 데이터 수신
if (db) {
  onValue(ref(db, "battery"), (snapshot) => {
    if (!snapshot.exists()) return;
    const data = snapshot.val();
    if (data && typeof data.level === 'number') {
      updateBattery(data.level, data.charging || false);
    }
  }, (error) => {
    console.error('❌ 배터리 데이터 로드 실패:', error);
    startBatteryDummy();
  });
} else {
  startBatteryDummy();
}

function startBatteryDummy() {
  console.warn('⚠️ 배터리 테스트 모드 (Firebase 미연결)');
  setInterval(() => {
    updateBattery(Math.floor(Math.random() * 101), Math.random() > 0.7);
  }, 3000);
}

/* ======================
   GPS 거리 계산
====================== */
let totalDistance = 0;
let previousLocation = null;
let lastUpdateTime = 0;

const GPS_TIMEOUT_MS = 6 * 60 * 60 * 1000; // 6시간
const GPS_NO_SIGNAL_MS = 10 * 1000;          // 10초

const distanceEl = document.getElementById('distance');

function setDistanceDisplay(text, color = '#7df9ff') {
  distanceEl.innerText = text;
  distanceEl.style.color = color;
}

function updateDistanceDisplay() {
  setDistanceDisplay(totalDistance.toFixed(2) + ' km');
}

function saveGpsState() {
  localStorage.setItem('totalDistance', totalDistance.toString());
  localStorage.setItem('lastGpsUpdate', lastUpdateTime.toString());
}

function resetGpsState() {
  totalDistance = 0;
  previousLocation = null;
  lastUpdateTime = 0;
  localStorage.removeItem('totalDistance');
  localStorage.removeItem('lastGpsUpdate');
  updateDistanceDisplay();
}

// 저장된 GPS 상태 복원 (6시간 이내 데이터만)
const savedDistance   = localStorage.getItem('totalDistance');
const savedLastUpdate = localStorage.getItem('lastGpsUpdate');

if (savedDistance && savedLastUpdate) {
  const timeSinceSave = Date.now() - parseInt(savedLastUpdate);
  if (timeSinceSave <= GPS_TIMEOUT_MS) {
    totalDistance = parseFloat(savedDistance);
    updateDistanceDisplay();
    console.log('📦 저장된 거리 복원:', totalDistance.toFixed(2), 'km');
  } else {
    console.log('🔄 6시간 경과 — GPS 거리 초기화');
    resetGpsState();
  }
} else if (savedDistance) {
  // 타임스탬프 없는 구버전 데이터 — 그냥 불러옴
  totalDistance = parseFloat(savedDistance);
  updateDistanceDisplay();
}

// GPS 신호 상태 주기적 체크 (1초)
setInterval(() => {
  if (lastUpdateTime === 0) return;

  const elapsed = Date.now() - lastUpdateTime;

  if (elapsed > GPS_TIMEOUT_MS) {
    console.log('⚠️ 6시간 GPS 신호 없음 — 초기화');
    resetGpsState();
  } else if (elapsed > GPS_NO_SIGNAL_MS) {
    setDistanceDisplay('⏸️ 신호없음', '#aaaaaa');
  }
}, 1000);

// 1분마다 로컬스토리지 저장
setInterval(() => {
  if (lastUpdateTime > 0) saveGpsState();
}, 60000);

// 페이지 종료 시 저장
window.addEventListener('beforeunload', () => {
  if (lastUpdateTime > 0) saveGpsState();
});

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ/2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

try {
  RealtimeIRL.forPullKey("zeoeyze9htbyx455").addLocationListener((location) => {
    if (!location.latitude || !location.longitude) return;

    lastUpdateTime = Date.now();

    if (previousLocation) {
      const dist = calculateDistance(
        previousLocation.latitude, previousLocation.longitude,
        location.latitude, location.longitude
      );
      totalDistance += dist / 1000;
    }

    previousLocation = { latitude: location.latitude, longitude: location.longitude };
    updateDistanceDisplay();
  });
  console.log('📍 GPS 연결 시작');
} catch (error) {
  console.error('❌ GPS 오류:', error);
  setDistanceDisplay('GPS 오류', '#ff4444');
}

/* ======================
   시간 업데이트
====================== */
function updateTime() {
  const now = new Date();
  document.getElementById('time').innerHTML =
    '🕐 ' + now.toLocaleTimeString('ko-KR', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });
}
updateTime();
setInterval(updateTime, 1000);

/* ======================
   날씨 업데이트
   ⚠️ WEATHER_API_KEY를 openweathermap.org 에서 발급받은 실제 키로 교체하세요
====================== */
const WEATHER_API_KEY = "3a4a39b054762e36581605681026ed35";
const CITY = "Sejong";

async function updateWeather() {
  try {
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_API_KEY}&units=metric&lang=kr`
    );
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const temp = Math.round(data.main.temp);
    const emoji = getWeatherEmoji(data.weather[0].icon);
    document.getElementById('weather').innerHTML = `${emoji} ${temp}°C`;
  } catch (error) {
    console.error('❌ 날씨 업데이트 실패:', error);
    document.getElementById('weather').innerHTML = '🌡️ --°C';
  }
}

function getWeatherEmoji(iconCode) {
  const map = {
    '01d': '☀️', '01n': '🌙',
    '02d': '⛅', '02n': '☁️',
    '03d': '☁️', '03n': '☁️',
    '04d': '☁️', '04n': '☁️',
    '09d': '🌧️', '09n': '🌧️',
    '10d': '🌦️', '10n': '🌧️',
    '11d': '⛈️', '11n': '⛈️',
    '13d': '❄️', '13n': '❄️',
    '50d': '🌫️', '50n': '🌫️'
  };
  return map[iconCode] || '🌡️';
}

updateWeather();
setInterval(updateWeather, 600000); // 10분마다 갱신

console.log('✅ 프랭크 오버레이 로드 완료');
</script>

</body>
</html>
